name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: ./build.sh

      - name: Create zip
        run: |
          cd build
          zip -r Karabasan.zip Karabasan.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Karabasan.zip
          generate_release_notes: true
